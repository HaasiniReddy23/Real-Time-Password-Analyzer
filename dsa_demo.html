<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Execution Console</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #00f3ff;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #bc13fe;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.2);
        }
        h1 { color: #fff; margin-bottom: 10px; }
        p { color: #888; font-size: 1.1rem; margin-bottom: 30px; }
        .key {
            background: #bc13fe;
            color: #fff;
            padding: 5px 12px;
            border-radius: 5px;
            font-weight: bold;
        }
        button {
            background: rgba(0, 243, 255, 0.1);
            color: #00f3ff;
            border: 1px solid #00f3ff;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-family: inherit;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        button:hover {
            background: #00f3ff;
            color: #000;
            box-shadow: 0 0 15px #00f3ff;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>DSA Engine Ready</h1>
        <p>Press the <span class="key">F12</span> key on your keyboard and open the <strong>Console</strong> tab.</p>
        <button onclick="executeAllDSA()">Run DSA Diagnostics in Console</button>
    </div>

    <script>
        // ============================================================================
        // STATUS 3 REQUIREMENT: DSA CONCEPTS IMPLEMENTED IN JAVASCRIPT
        // ============================================================================

        // 1. DATA STRUCTURE: QUEUE (FIFO) - Used to queue up security evaluations
        class EvaluationQueue {
            constructor() { this.items = []; }
            enqueue(element) { this.items.push(element); }
            dequeue() { return this.items.shift(); }
            isEmpty() { return this.items.length === 0; }
        }

        // 2. DATA STRUCTURE: STACK (LIFO) - Used for Undo Action History
        class ActionStack {
            constructor() { this.items = []; }
            push(element) { this.items.push(element); }
            pop() { return this.items.pop(); }
            peek() { return this.items[this.items.length - 1]; }
        }

        // 3. ALGORITHM: MERGE SORT (O(n log n)) - Used to organize vault alphabetically
        function mergeSort(arr) {
            if (arr.length <= 1) return arr;
            const mid = Math.floor(arr.length / 2);
            const left = mergeSort(arr.slice(0, mid));
            const right = mergeSort(arr.slice(mid));
            return merge(left, right);
        }

        function merge(left, right) {
            let result = [], l = 0, r = 0;
            while (l < left.length && r < right.length) {
                // Sorting by Username Alphabetically
                if (left[l].user.toLowerCase() < right[r].user.toLowerCase()) {
                    result.push(left[l++]);
                } else {
                    result.push(right[r++]);
                }
            }
            return result.concat(left.slice(l)).concat(right.slice(r));
        }

        // 4. ALGORITHM: BINARY SEARCH (O(log n)) - Used to find a specific user quickly
        function binarySearch(sortedArr, targetUser) {
            let left = 0;
            let right = sortedArr.length - 1;

            while (left <= right) {
                const mid = Math.floor((left + right) / 2);
                const currentName = sortedArr[mid].user.toLowerCase();
                const targetName = targetUser.toLowerCase();

                if (currentName === targetName) return sortedArr[mid];
                if (currentName < targetName) left = mid + 1;
                else right = mid - 1;
            }
            return null; // Not found
        }

        // 5. DATA STRUCTURE: HASH MAP (O(1)) - SATISFIES CO4 (Fast Lookups)
        // Equivalent to Java Collections Map interface implementation
        class SecurityHashMap {
            constructor() { 
                this.vaultMap = new Map(); // Built-in JS Hash Table 
            }
            // Stores data as a Key-Value pair (Chaining/Hashing handled by JS Engine)
            saveUser(username, status) { 
                this.vaultMap.set(username.toLowerCase(), status); 
            }
            // Retrieves data instantly - O(1) Time Complexity
            checkStatus(username) { 
                return this.vaultMap.get(username.toLowerCase()) || "Not Found"; 
            }
        }

        // ============================================================================
        // MAIN EXECUTION LOGIC (Outputs to Console as requested by Rubric)
        // ============================================================================
        function executeAllDSA() {
            console.clear();
            console.log("%c=============================================", "color: #bc13fe; font-weight: bold; font-size: 14px;");
            console.log("%c  INITIATING DSA INTEGRATION PROTOCOL (JS)   ", "color: #00f3ff; font-weight: bold; font-size: 16px;");
            console.log("%c=============================================\n", "color: #bc13fe; font-weight: bold; font-size: 14px;");

            // --- 0. ARRAYS/LISTS: Fetching Real Data ---
            console.group("%c1. ARRAY/LIST: Fetching Local Vault Data", "color: #0aff0a; font-size: 14px;");
            let rawData = JSON.parse(localStorage.getItem('passwordVault')) || [];
            
            if (rawData.length === 0) {
                console.warn("Vault is empty! Using sample academic data for demonstration.");
                rawData = [
                    { user: "zebra_admin", type: "enterprise", status: "WEAK" },
                    { user: "alpha_student", type: "personal", status: "GOOD" },
                    { user: "charlie_faculty", type: "enterprise", status: "ELITE" }
                ];
            }
            console.table(rawData);
            console.groupEnd();

            // --- 1. QUEUE: Processing Workflow ---
            console.group("\n%c2. QUEUE: Processing User Evaluations (FIFO)", "color: #fcee0a; font-size: 14px;");
            const processQueue = new EvaluationQueue();
            rawData.forEach(item => {
                console.log(`Enqueueing task for: ${item.user}`);
                processQueue.enqueue(item);
            });
            console.log("--- Executing Queue ---");
            while(!processQueue.isEmpty()) {
                const processed = processQueue.dequeue();
                console.log(`✅ Processed: ${processed.user} [Status: ${processed.status}]`);
            }
            console.groupEnd();

            // --- 2. STACK: Undo History ---
            console.group("\n%c3. STACK: Action History / Undo Feature (LIFO)", "color: #ff003c; font-size: 14px;");
            const historyStack = new ActionStack();
            rawData.forEach(item => historyStack.push(item));
            console.log(`Current top of stack: ${historyStack.peek().user}`);
            console.log(`User clicked UNDO! Popping element:`, historyStack.pop());
            console.log(`New top of stack: ${historyStack.peek().user}`);
            console.groupEnd();

            // --- 3. SORTING: Merge Sort ---
            console.group("\n%c4. SORTING: Applying Merge Sort O(n log n)", "color: #bc13fe; font-size: 14px;");
            console.log("Data before sort (Unorganized):", rawData.map(d => d.user));
            const sortedData = mergeSort(rawData);
            console.log("Data after Merge Sort (Alphabetical):", sortedData.map(d => d.user));
            console.groupEnd();

            // --- 4. SEARCHING: Binary Search ---
            console.group("\n%c5. SEARCHING: Binary Search O(log n)", "color: #00f3ff; font-size: 14px;");
            const target = sortedData[0].user; 
            console.log(`Searching for target user: "${target}"...`);
            
            const searchResult = binarySearch(sortedData, target);
            if (searchResult) {
                console.log(`🎯 HIT! Found User Record:`, searchResult);
            } else {
                console.error(`❌ MISS! User not found.`);
            }
            console.groupEnd();

            // --- 5. HASH MAP: CO4 Fast Lookup ---
            console.group("\n%c6. HASH MAP: Instant O(1) Lookups (CO4 Requirement)", "color: #ff00ff; font-size: 14px;");
            const userMap = new SecurityHashMap();
            rawData.forEach(item => userMap.saveUser(item.user, item.status));
            console.log("Hash Map populated with Key-Value pairs. Performing O(1) instant lookup...");
            
            const mapTarget = "alpha_student"; 
            console.log(`Status lookup for '${mapTarget}':`, userMap.checkStatus(mapTarget));
            console.groupEnd();

            console.log("\n%c[✓] DSA DEMONSTRATION COMPLETE.", "color: #0aff0a; font-weight: bold; font-size: 14px;");
        }
    </script>
</body>
</html>
